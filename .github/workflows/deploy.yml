name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Docusaurus site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Sync entries into docs
        run: |
          rm -rf website/docs/kalshi website/docs/kraken
          mkdir -p website/docs/kalshi website/docs/kraken
          cp entries/kalshi/*.md website/docs/kalshi/
          cp entries/kraken/*.md website/docs/kraken/
          cp schema.md website/docs/schema.md
          cp CONTRIBUTING.md website/docs/CONTRIBUTING.md

      - name: Build site
        run: npm run build
        working-directory: website

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build
